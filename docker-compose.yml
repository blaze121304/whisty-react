version: '3.8'

services:
  whisty-react:
    build:
      context: .
      args:
        # 브라우저에서 접근 가능한 백엔드 주소
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:10006/api"
    image: whisty-react:latest
    container_name: whisty-react
    ports:
      - "10007:10007"
    restart: unless-stopped
    environment:
      NODE_ENV: production

